# ============================================================================
#  base.yml — arch-agnostischer Service-Graph
#  Niemals allein verwenden: immer mit einem Arch-Override mergen
#  (COMPOSE_FILE in .env = compose/base.yml:compose/arm64.yml).
#  Das `command` der GPU-Dienste liegt bewusst im Arch-Override, weil
#  Quant-Backend/Flags architekturabhängig sind.
# ============================================================================

networks:
  aistack:
    driver: bridge

volumes:
  qdrant-data:
  mongo-data:
  librechat-images:
  librechat-uploads:
  librechat-logs:

services:

  # ---- Core (always-on) ----------------------------------------------------
  gateway:
    image: ${LITELLM_IMAGE}
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      # Relative Pfade löst Compose relativ zu compose/ auf -> ../
      - ../gateway/litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      llm:
        condition: service_healthy
    networks: [aistack]
    healthcheck:
      # Das LiteLLM-Image hat kein curl/wget -> python3-Probe
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5

  qdrant:
    image: ${QDRANT_IMAGE}
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [aistack]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  llm:
    image: ${VLLM_IMAGE}
    container_name: ai-llm
    restart: unless-stopped
    # command -> siehe compose/arm64.yml bzw. compose/x86.yml
    ports:
      - "${LLM_PORT}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HF_HOME}:/root/.cache/huggingface
    ipc: host                       # vLLM braucht großen /dev/shm
    networks: [aistack]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20               # Ladezeit großer Modelle einkalkulieren
      start_period: 300s

  # ---- Chat-UI: LibreChat + MongoDB (Core, CPU-only) ------------------------
  #  Front-end-Entscheidung Session 4: LibreChat (MIT) statt Open WebUI
  #  (Custom-Lizenz). Bewusst OHNE rag_api/pgvector/Meilisearch — RAG kommt
  #  als eigener MCP-Retrieval-Server (Schritt 3). Konfig: services/librechat/.
  librechat:
    image: ${LIBRECHAT_IMAGE}
    container_name: ai-librechat
    restart: unless-stopped
    ports:
      - "${LIBRECHAT_PORT}:3080"
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      # ${...} in librechat.yaml löst LibreChat gegen DIESE Container-Env auf:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Feste LibreChat-Var-Namen, Werte aus .env (Generierung: .env.example)
      JWT_SECRET: ${LIBRECHAT_JWT_SECRET}
      JWT_REFRESH_SECRET: ${LIBRECHAT_JWT_REFRESH_SECRET}
      CREDS_KEY: ${LIBRECHAT_CREDS_KEY}
      CREDS_IV: ${LIBRECHAT_CREDS_IV}
      SEARCH: "false"              # kein Meilisearch im Stack
      ALLOW_REGISTRATION: "true"   # vor LAN-Freigabe abwägen (HOW-TO.md)
      APP_TITLE: ${LIBRECHAT_APP_TITLE:-AI-Stack}
      NO_INDEX: "true"
      # Serverseitiger Think-Filter der manuellen TTS-Route (patches/TTSService.js).
      # "true" = Think-Block wird wieder mit vorgelesen (Filter aus).
      TTS_READ_THINK: ${TTS_READ_THINK:-false}
    volumes:
      - ../services/librechat/librechat.yaml:/app/librechat.yaml:ro
      # Patches (an v0.8.7 gebunden, beim Image-Update prüfen!): TTS soll den
      # Think-Block nicht vorlesen — Server- UND Client-Pfad, siehe
      # services/librechat/patches/ (README dort erklärt beide).
      - ../services/librechat/patches/streamAudio.js:/app/api/server/services/Files/Audio/streamAudio.js:ro
      - ../services/librechat/patches/TTSService.js:/app/api/server/services/Files/Audio/TTSService.js:ro
      - ../services/librechat/patches/hooks.Bi3Cm4Qy.js:/app/client/dist/assets/hooks.Bi3Cm4Qy.js:ro
      # sw.js: Revision-Bump für hooks-Eintrag, sonst serviert der Service
      # Worker installierter Browser ewig das ALTE Bundle (revision:null)
      - ../services/librechat/patches/sw.js:/app/client/dist/sw.js:ro
      - librechat-images:/app/client/public/images
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/api/logs
    depends_on:
      mongodb:
        condition: service_healthy
      # bewusst KEINE Abhängigkeit auf gateway: UI startet sofort,
      # Modelle sind konfiguriert (fetch: false) und greifen, sobald
      # das Gateway da ist.
    networks: [aistack]
    healthcheck:
      # Image ohne curl/wget -> node-Probe (analog Gateway/python3)
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3080/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  mongodb:
    image: ${MONGO_IMAGE}
    container_name: ai-mongodb
    restart: unless-stopped
    # KEIN Host-Port: nur im Compose-Netz erreichbar (läuft ohne Auth).
    # Hinweis: MongoDB Server ist SSPL-lizenziert (interne Nutzung unkritisch).
    command: mongod --noauth
    volumes:
      - mongo-data:/data/db
    networks: [aistack]
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping: 1})' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ---- LLM-fast (on-demand: `--profile fast` / `make up-fast`) -------------
  llm-fast:
    profiles: ["fast"]
    image: ${VLLM_IMAGE}
    container_name: ai-llm-fast
    restart: unless-stopped
    # command -> siehe compose/arm64.yml bzw. compose/x86.yml
    ports:
      - "${LLM_FAST_PORT}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HF_HOME}:/root/.cache/huggingface
    ipc: host
    networks: [aistack]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  # ---- Voice (on-demand: `--profile voice`) --------------------------------
  stt:
    profiles: ["voice"]
    image: ${STT_IMAGE:-ghcr.io/aeon-7/qwen3-asr-server:latest}   # siehe services/stt/README.md
    container_name: ai-stt
    restart: unless-stopped
    # command -> Arch-Override. Container-Port ist 8001 (Upstream-Default),
    # der Healthcheck kommt fertig aus dem Image (prüft 8001/v1/models).
    ports:
      - "${STT_PORT}:8001"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HF_HOME}:/root/.cache/huggingface
    ipc: host
    networks: [aistack]
    deploy:
      resources: { reservations: { devices: [{ driver: nvidia, count: all, capabilities: [gpu] }] } }

  tts:
    profiles: ["voice"]
    image: ${TTS_IMAGE:-martinb78/faster-qwen3-tts-dgx-spark:latest}   # siehe services/tts/README.md
    container_name: ai-tts
    restart: unless-stopped
    # command -> Arch-Override (Server-Skripte kommen aus services/tts/upstream/config)
    ports:
      - "${TTS_PORT}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${TTS_MODEL_DIR}:/models/Qwen3-TTS-CustomVoice:ro
      - ../services/tts/upstream/config:/config:rw
      # Eigene Voice-Definitionen (DE/EN) überlagern die Upstream-Datei:
      - ../services/tts/customvoice_voices.json:/config/customvoice_voices.json:ro
    ipc: host
    networks: [aistack]
    deploy:
      resources: { reservations: { devices: [{ driver: nvidia, count: all, capabilities: [gpu] }] } }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ---- RAG (on-demand: `--profile rag`) ------------------------------------
  embedding:
    profiles: ["rag"]
    image: ${VLLM_IMAGE}                            # vLLM serviert auch Embeddings
    container_name: ai-embedding
    # command -> Arch-Override (vllm serve ... --task embed)
    environment:
      HF_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ${HF_HOME}:/root/.cache/huggingface
    ipc: host
    networks: [aistack]
    deploy:
      resources: { reservations: { devices: [{ driver: nvidia, count: all, capabilities: [gpu] }] } }

  ocr:
    profiles: ["rag"]
    image: ${OCR_IMAGE:-ai-stack/docling:local}     # siehe services/ocr/README.md
    container_name: ai-ocr
    environment:
      HF_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ${HF_HOME}:/root/.cache/huggingface
    networks: [aistack]
    deploy:
      resources: { reservations: { devices: [{ driver: nvidia, count: all, capabilities: [gpu] }] } }
