# ============================================================================
#  LiteLLM — ein OpenAI-kompatibler Endpoint vor allen Backends.
#  Clients sprechen nur :4000; Modelle dahinter sind austauschbar.
# ============================================================================

model_list:
  # ---- Core: Qwen3.6-27B (always-on) --------------------------------------
  - model_name: qwen3.6-27b            # so fragen Clients an
    litellm_params:
      model: openai/qwen3.6-27b        # == --served-model-name im vLLM
      api_base: http://llm:8000/v1
      api_key: dummy                   # vLLM ignoriert das, LiteLLM braucht einen Wert

  # ---- Instant: derselbe 27B ohne Thinking (0 extra Speicher) ---------------
  #  Für Titel, Zusammenfassungen, Query-Rewriting etc. Gemessen: Titel-Prompt
  #  98s/960 Tokens (Thinking) vs. 1s/9 Tokens (ohne). LibreChat-titleModel.
  - model_name: qwen3.6-27b-instant
    litellm_params:
      model: openai/qwen3.6-27b
      api_base: http://llm:8000/v1
      api_key: dummy
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  # ---- Fast: Qwen3.6-35B-A3B MoE (Profil `fast`) — Start via `make up-fast`.
  #      Solange der Dienst nicht läuft, schlagen nur Anfragen an DIESES Modell fehl.
  - model_name: qwen3.6-35b-fast
    litellm_params:
      model: openai/qwen3.6-35b-fast
      api_base: http://llm-fast:8000/v1
      api_key: dummy

  # ---- RAG: Embedding (Profil `rag`) — bei Ausbau einkommentieren ---------
  # - model_name: qwen3-embedding
  #   litellm_params:
  #     model: openai/qwen3-embedding
  #     api_base: http://embedding:8000/v1
  #     api_key: dummy

  # ---- Voice (Profil `voice`) ----------------------------------------------
  #   STT/TTS sind OpenAI-Audio-kompatibel; Clients können sie auch direkt
  #   unter http://stt:8001 (Host: :8003) / http://tts:8000 (Host: :8002) aufrufen.
  # TTS: Start via `make up-tts`; solange aus, schlagen nur TTS-Anfragen fehl.
  - model_name: qwen3-tts
    litellm_params:
      model: openai/qwen3-tts
      api_base: http://tts:8000/v1
      api_key: dummy
      # Default MP3 statt WAV: Browser/LibreChat erwarten audio/mpeg
      # (LibreChat sendet kein response_format und setzt den MIME-Type hart).
      # Clients können weiterhin explizit response_format=wav anfordern.
      response_format: mp3
  # STT: Start via `make up-stt`; Container-Port 8001 (Upstream-Default).
  # Provider hosted_vllm (nicht openai): der openai-Provider erzwingt bei
  # Transkription response_format=verbose_json, das vLLM nicht unterstützt.
  - model_name: qwen3-asr
    litellm_params:
      model: hosted_vllm/qwen3-asr
      api_base: http://stt:8001/v1
      api_key: dummy

litellm_settings:
  drop_params: true          # unbekannte Params tolerieren statt Fehler

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
